<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Shinobi Tap — Mühür Combo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Bangers&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=15" />
</head>
<body>
  <div id="app">
    <!-- ÜST HUD -->
    <header id="hud">
      <div class="hud-row1">
        <div class="icon-stack">
          <button class="icon-btn" id="gear" title="Sıfırla">⚙️</button>
        </div>
        <div class="enemy-info">
          <div id="enemy-name" class="enemy-name">Haydut</div>
          <div class="hp-track">
            <div id="hpbar" class="hp-fill"></div>
            <span id="hptext" class="hp-text">50 HP</span>
          </div>
        </div>
        <div id="kill-counter" class="kill-counter">
          <span class="skull">💀</span><span id="kills">1</span><small>/10</small>
        </div>
      </div>
      <div class="hud-row2">
        <div class="gold-pill"><span class="coin">🪙</span><span id="gold">0</span></div>
        <div class="lvl-pill">
          <span>Lv <b id="level">1</b></span>
          <div class="xp-track"><div id="xpbar" class="xp-fill"></div></div>
        </div>
        <div id="combo-pill" class="combo-pill">COMBO x<span id="combo-mult">1.0</span></div>
      </div>
    </header>

    <!-- ARENA (çok katmanlı pixel-art sahne) -->
    <section id="arena">
      <div class="scene" id="sc-sky"></div>
      <div class="scene" id="sc-cel"></div>
      <div class="scene" id="sc-far"></div>
      <div class="scene" id="sc-mid"></div>
      <div class="scene" id="sc-atmo"></div>
      <div class="scene" id="sc-deco"></div>
      <div id="combo-flash"></div>
      <div id="stage-banner"></div>
      <div id="boss-timer" class="hidden">
        <div class="bt-bar"><div id="boss-bar"></div></div>
        <span id="boss-text">⏱ 30</span>
      </div>
      <div id="portal" class="hidden"></div>
      <div id="countdown" class="hidden"></div>

      <div id="enemy-wrap">
        <div id="enemy" role="button" aria-label="Düşmana saldır"><span id="enemy-icon">👹</span></div>
        <div id="enemy-shadow"></div>
      </div>

      <div id="hero"><div id="hero-aura"></div><span id="hero-icon">🥷</span></div>
      <div id="hero-shadow"></div>
      <div id="allies-left" class="ally-row"></div>
      <div id="allies-right" class="ally-row"></div>

      <div id="platform"></div>
      <div id="ledge-left" class="ledge"></div>
      <div id="ledge-right" class="ledge"></div>
      <div id="float-layer"></div>
      <div id="particle-layer"></div>
    </section>

    <!-- ALT DOCK (sekmeli) -->
    <section id="dock">
      <div id="tab-content">

        <!-- SAVAŞ: skill bar + aktif jutsu + mühür takımı -->
        <div class="panel" data-panel="combat">
          <div id="skill-bar"></div>
          <div class="active-line">
            <span id="jutsu-icon" class="jutsu-icon">🔥</span>
            <div class="jutsu-titles">
              <span id="jutsu-jp" class="jutsu-jp">火遁・豪火球の術</span>
              <span id="jutsu-name" class="jutsu-name">Katon: Gōkakyū</span>
            </div>
          </div>
          <div id="seal-pad">
            <div id="pad-left" class="pad-group"></div>
            <div id="pad-right" class="pad-group"></div>
          </div>
        </div>

        <!-- JUTSU listesi -->
        <div class="panel hidden" data-panel="skills">
          <div class="panel-head"><span id="skills-title">Jutsu Açma</span><span class="ph-gold">🪙 <span class="gold-mirror">0</span></span></div>
          <div id="skill-list" class="card-list"></div>
        </div>

        <!-- DOST mağazası -->
        <div class="panel hidden" data-panel="pets">
          <div class="panel-head"><span>Dostlar <small style="opacity:.7;font-weight:600">(oto hasar)</small></span><span class="ph-gold">🪙 <span class="gold-mirror">0</span></span></div>
          <div id="pet-list" class="card-list"></div>
        </div>

        <!-- GÜÇ geliştirmeleri -->
        <div class="panel hidden" data-panel="power">
          <div class="panel-head"><span id="tapdmg-title">11 Tap Hasarı</span><span class="ph-gold">🪙 <span class="gold-mirror">0</span></span></div>
          <div id="power-list" class="card-list"></div>
        </div>

        <!-- İSTATİSTİK -->
        <div class="panel hidden" data-panel="stats">
          <div class="panel-head"><span>İstatistikler</span></div>
          <div id="stats-list"></div>
        </div>
      </div>

      <nav id="tab-bar">
        <button class="tab active" data-tab="combat" style="--tc:#ff5a4d">⚔️<small>SAVAŞ</small></button>
        <button class="tab" data-tab="skills" style="--tc:#3aa0ff">🌀<small>JUTSU</small></button>
        <button class="tab" data-tab="pets"   style="--tc:#7dff8a">🤝<small>DOST</small></button>
        <button class="tab" data-tab="power"  style="--tc:#ffd24a">💪<small>GÜÇ</small></button>
        <button class="tab" data-tab="stats"  style="--tc:#b89bff">⭐<small>İSTAT</small></button>
      </nav>
    </section>
  </div>

  <script src="game.js?v=15"></script>
</body>
</html>
