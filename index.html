<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Shinobi 2048 — Mühür Akışı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Bangers&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=26" />
</head>
<body>
  <div id="app">
    <!-- ÜST HUD -->
    <header id="hud">
      <div class="hud-row1">
        <div class="icon-stack">
          <button class="icon-btn" id="gear" title="Sıfırla">⚙️</button>
          <button class="icon-btn" id="snd-toggle" title="Ses">🔊</button>
          <!-- TEST BUTONU — SONRA KALDIR -->
          <button class="icon-btn" id="dbg-gold" title="TEST: +100K ryō">💰</button>
        </div>
        <div class="enemy-info">
          <div id="enemy-name" class="enemy-name">Haydut</div>
          <div class="hp-track">
            <div id="hpbar" class="hp-fill"></div>
            <span id="hptext" class="hp-text">50 HP</span>
          </div>
          <div id="deadline" class="deadline"></div>
        </div>
        <div id="stage-counter" class="kill-counter">
          <span class="skull">🏯</span><span id="stage-num">1</span>
        </div>
      </div>
      <div class="hud-row2">
        <div class="gold-pill"><span class="coin">🪙</span><span id="gold">0</span></div>
        <div class="lvl-pill">
          <span>Skor</span>
          <div class="xp-track"><div id="xpbar" class="xp-fill"></div></div>
          <b id="score">0</b>
        </div>
        <div id="combo-pill" class="combo-pill">COMBO x<span id="combo-mult">1.0</span></div>
      </div>
    </header>

    <!-- ARENA (çok katmanlı pixel-art sahne) -->
    <section id="arena">
      <div class="scene" id="sc-sky"></div>
      <div class="scene" id="sc-cel"></div>
      <div class="scene" id="sc-far"></div>
      <div class="scene" id="sc-mid"></div>
      <div class="scene" id="sc-atmo"></div>
      <div class="scene" id="sc-deco"></div>
      <div id="combo-flash"></div>
      <div id="stage-banner"></div>
      <div id="portal" class="hidden"></div>
      <div id="countdown" class="hidden"></div>

      <div id="enemy-wrap">
        <div id="enemy" role="img" aria-label="Düşman"><span id="enemy-icon">👹</span></div>
        <div id="enemy-shadow"></div>
      </div>

      <div id="hero"><div id="hero-aura"></div><span id="hero-icon">🥷</span></div>
      <div id="hero-shadow"></div>

      <div id="platform"></div>
      <div id="float-layer"></div>
      <div id="particle-layer"></div>
    </section>

    <!-- ALT DOCK (sekmeli) -->
    <section id="dock">
      <div id="tab-content">

        <!-- OYUN: 2048 tahtası -->
        <div class="panel" data-panel="board">
          <div id="board-head">
            <span id="board-tip">Kaydır → birleştir → canavarı yık · 🪨 taş · 🃏 joker · 🪙 altın · 💣 bomba</span>
          </div>
          <div id="ability-bar"></div>
          <div id="board-wrap">
            <div id="board">
              <div id="cell-bg"></div>
              <div id="tile-layer"></div>
            </div>
            <div id="board-over" class="hidden">
              <div class="bo-title">Çakra Tükendi</div>
              <div class="bo-sub">Tahta tıkandı — ama ryō, güç ve aşaman duruyor.</div>
              <button id="bo-restart" class="big-btn">Tekrar Akışa Geç</button>
            </div>
          </div>
        </div>

        <!-- GÜÇ geliştirmeleri (kalıcı) -->
        <div class="panel hidden" data-panel="power">
          <div class="panel-head"><span>Güç <small style="opacity:.7;font-weight:600">(kalıcı)</small></span><span class="ph-gold">🪙 <span class="gold-mirror">0</span></span></div>
          <div id="power-list" class="card-list"></div>
        </div>

        <!-- YETENEK (her akış sınırlı kullanım) -->
        <div class="panel hidden" data-panel="ability">
          <div class="panel-head"><span>Yetenek <small style="opacity:.7;font-weight:600">(her akış sınırlı)</small></span><span class="ph-gold">🪙 <span class="gold-mirror">0</span></span></div>
          <div id="ability-list" class="card-list"></div>
        </div>

        <!-- İSTATİSTİK -->
        <div class="panel hidden" data-panel="stats">
          <div class="panel-head"><span>İstatistikler</span></div>
          <div id="stats-list"></div>
        </div>
      </div>

      <nav id="tab-bar">
        <button class="tab active" data-tab="board" style="--tc:#ff5a4d">🎴<small>OYUN</small></button>
        <button class="tab" data-tab="ability" style="--tc:#7ae7ff">✨<small>YETENEK</small></button>
        <button class="tab" data-tab="power"  style="--tc:#ffd24a">💪<small>GÜÇ</small></button>
        <button class="tab" data-tab="stats"  style="--tc:#b89bff">⭐<small>İSTAT</small></button>
      </nav>
    </section>
  </div>

  <script src="game.js?v=26"></script>
</body>
</html>
